<title>uncle-b -- 名刺デザイン v6</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand:      #E13F11;
    --ink:        #1C1208;
    --warm-white: #FBF8F5;
    --muted:      #9A8E88;
    --rule:       #E5DDD8;
  }
  body {
    font-family: "Yu Gothic","游ゴシック","Hiragino Kaku Gothic ProN",
                 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background: #EDE7E1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 40px;
    color: var(--ink);
  }
  h1 { font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); font-weight:400; }
  .cards-wrapper { display:flex; flex-direction:column; gap:16px; align-items:center; }
  .card-label { font-size:10px; letter-spacing:.22em; color:var(--muted); font-weight:400; align-self:flex-start; text-transform:uppercase; }
  .card { width:546px; height:330px; border-radius:7px; overflow:hidden;
    box-shadow:0 6px 28px rgba(28,18,8,.16),0 1px 5px rgba(28,18,8,.08);
    position:relative; flex-shrink:0; }
  .card-back { background:var(--warm-white); display:grid;
    grid-template-columns:1fr auto; grid-template-rows:1fr auto;
    padding:26px 34px 26px 42px; position:relative; }
  .card-back::before { content:''; position:absolute; left:0; top:0; bottom:0;
    width:5px; background:var(--brand); border-radius:7px 0 0 7px; }
  .info-block { grid-column:1; grid-row:1; display:flex; flex-direction:column;
    justify-content:center; gap:4px; }
  .company { font-size:10px; letter-spacing:.18em; color:var(--brand); font-weight:500; margin-bottom:8px; }
  .contact-block { grid-column:1; grid-row:2; display:flex; flex-direction:column;
    gap:6px; padding-top:14px; border-top:1px solid var(--rule); margin-top:auto; }
  .contact-item { display:flex; align-items:flex-start; gap:10px;
    color:var(--ink); letter-spacing:.04em; font-variant-numeric:tabular-nums; line-height:1; }
  .ct-label { font-size:9.5px; letter-spacing:.2em; color:var(--muted);
    text-transform:uppercase; width:44px; flex-shrink:0; padding-top:1px; }
  .logo-small-wrap { grid-column:2; grid-row:1/3; display:flex;
    align-items:flex-end; justify-content:flex-end; padding-left:16px; }
  .logo-small-wrap img { width:50px; height:50px; display:block; opacity:.88; }
  .note { font-size:10.5px; color:var(--muted); letter-spacing:.1em; text-align:center; }

  .card-front { background:var(--brand); display:flex; align-items:center;
    justify-content:center; position:relative; }
  .front-philosophy { position:absolute; right:20px; top:50%;
    transform:translateY(-50%); writing-mode:vertical-rl;
    text-orientation:mixed; color:rgba(255,255,255,.28);
    font-size:9.5px; letter-spacing:.45em; font-weight:300; }
  .logo-wrap { display:flex; flex-direction:column; align-items:center;
    gap:12px; margin-right:14px; }
  .logo-wrap img { width:108px; height:108px; display:block; }
  .front-name { color:rgba(255,255,255,.90); font-size:12px;
    letter-spacing:.22em; font-weight:400; }
  .front-tagline { color:rgba(255,255,255,.55); font-size:9px;
    letter-spacing:.18em; font-weight:300; margin-top:-2px; }
  .name-ja { font-size:23px; font-weight:500; letter-spacing:.1em; color:var(--ink); line-height:1.1; }
  .name-en { font-size:11px; letter-spacing:.2em; color:var(--muted); font-weight:400; margin-top:4px; }
  .contact-item { font-size:12px; }
</style>
